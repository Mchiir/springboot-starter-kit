server.port=8080
spring.application.name=springboot-starter-kit-api

# PostgreSQL Datasource
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:starterkit}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JWT (1 hour in milliseconds of expiration)
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Database Migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Actuator (Monitoring - no Prometheus/Grafana)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoints.web.base-path=/actuator

management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# Metrics Configuration (Basic only)
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=${ENVIRONMENT:development}

management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.9,0.95,0.99

# SpringDoc OpenAPI / Swagger
springdoc.api-docs.path=/api-docs

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

springdoc.show-actuator=true

# Logging (Clean + Standardized)
logging.level.root=INFO
logging.level.com.mchiir=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=OFF